<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChatNet – Local Network Chat</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ─── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0f1117;
      --sidebar:   #161b22;
      --card:      #1c2230;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --danger:    #f85149;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --msg-self:  #1f3a5c;
      --msg-other: #1c2230;
      --msg-sys:   #161b22;
      --radius:    10px;
      --font:      'Segoe UI', system-ui, sans-serif;
      --sidebar-w: 240px;
      --header-h:  52px;
    }

    html, body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── Login Overlay ─────────────────────────────────── */
    #login-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: .2rem; color: var(--accent); }
    .login-card p  { color: var(--muted); font-size: .85rem; margin-bottom: 1.4rem; }
    .login-card label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .3rem; }
    .login-card input,
    .login-card select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: .65rem .9rem;
      font-size: 1rem; /* prevents iOS zoom-on-focus */
      margin-bottom: 1rem; outline: none;
      transition: border-color .2s;
    }
    .login-card input:focus,
    .login-card select:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
      padding: .7rem 1.2rem; border-radius: 8px; border: none;
      cursor: pointer; font-size: .95rem; font-weight: 600;
      transition: opacity .2s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #000; width: 100%; }
    .btn-primary:hover { opacity: .88; }

    /* ─── App Shell ─────────────────────────────────────── */
    #app {
      display: flex; width: 100%;
      height: 100%; height: 100dvh;
      position: relative;
    }

    /* ─── Mobile dim overlay ────────────────────────────── */
    #sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 50;
    }
    #sidebar-overlay.active { display: block; }

    /* ─── Sidebar ────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform .25s ease;
      z-index: 60; flex-shrink: 0;
    }
    .sidebar-header {
      padding: .85rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h2 { font-size: .95rem; color: var(--accent); letter-spacing: .4px; }
    .sidebar-header .sub { font-size: .72rem; color: var(--muted); }
    .sidebar-close-btn {
      display: none;
      background: none; border: none;
      color: var(--muted); font-size: 1.2rem; cursor: pointer;
      padding: .2rem .4rem;
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-section {
      padding: .6rem 1rem .25rem;
      font-size: .68rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
    }
    .room-list { overflow-y: auto; padding: 0 .5rem; }
    .user-list-sidebar { flex: 0 1 auto; max-height: 200px; overflow-y: auto; padding: 0 .5rem; }
    .room-list { flex: 1; }

    .room-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem .65rem; border-radius: 6px; cursor: pointer;
      font-size: .875rem; color: var(--muted);
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .room-item:hover, .room-item:active { background: var(--card); color: var(--text); }
    .room-item.active { background: rgba(88,166,255,.15); color: var(--accent); font-weight: 600; }
    .room-item .badge {
      background: var(--accent); color: #000;
      border-radius: 10px; font-size: .68rem;
      padding: 0 .4rem; font-weight: 700;
    }
    .new-room-btn {
      margin: .5rem;
      background: transparent; border: 1px dashed var(--border);
      border-radius: 6px; color: var(--muted);
      width: calc(100% - 1rem); padding: .45rem;
      font-size: .8rem; cursor: pointer;
      transition: border-color .2s, color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .new-room-btn:hover { border-color: var(--accent); color: var(--accent); }

    .user-dot {
      display: flex; align-items: center; gap: .55rem;
      padding: .4rem .6rem; border-radius: 6px;
      font-size: .83rem; cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .user-dot:hover { background: var(--card); }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent2); flex-shrink: 0;
    }
    .sidebar-footer {
      padding: .75rem 1rem;
      border-top: 1px solid var(--border);
    }
    .me-badge { display: flex; align-items: center; gap: .5rem; font-size: .8rem; color: var(--muted); }

    /* ─── Chat Area ──────────────────────────────────────── */
    .chat-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0;
    }

    /* ─── Chat Header ────────────────────────────────────── */
    .chat-header {
      height: var(--header-h); padding: 0 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--sidebar);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: .5rem;
    }
    .chat-header-left { display: flex; align-items: center; gap: .6rem; min-width: 0; }
    .hamburger-btn {
      display: none; background: none; border: none;
      color: var(--muted); font-size: 1.2rem; cursor: pointer;
      padding: .3rem; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .chat-header h3 { font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #room-member-count { font-size: .75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    /* ─── Messages ───────────────────────────────────────── */
    .messages {
      flex: 1; overflow-y: auto;
      padding: .85rem 1rem;
      display: flex; flex-direction: column; gap: .25rem;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { display: flex; gap: .55rem; max-width: 80%; }
    .msg.self    { align-self: flex-end; flex-direction: row-reverse; }
    .msg.system  { align-self: center; max-width: 100%; }
    .msg.private { align-self: flex-end; max-width: 80%; }

    .msg-body { display: flex; flex-direction: column; gap: .12rem; min-width: 0; }
    .msg-meta {
      display: flex; align-items: center; gap: .35rem;
      font-size: .7rem; color: var(--muted);
    }
    .msg.self .msg-meta { justify-content: flex-end; }
    .msg-meta .name { font-weight: 600; }

    .bubble {
      background: var(--msg-other); border-radius: var(--radius);
      padding: .5rem .8rem; font-size: .88rem; line-height: 1.5;
      word-break: break-word; border: 1px solid var(--border);
    }
    .msg.self .bubble    { background: var(--msg-self); border-color: rgba(88,166,255,.3); }
    .msg.system .bubble  {
      background: var(--msg-sys); font-size: .77rem;
      color: var(--muted); font-style: italic;
      padding: .28rem .75rem; border: none; text-align: center;
    }
    .msg.private .bubble { background: #2d1a3e; border-color: #9b59b6; }
    .private-tag {
      font-size: .68rem; background: #9b59b6; color: #fff;
      padding: .1rem .35rem; border-radius: 4px;
    }
    .bubble img { max-width: 260px; width: 100%; border-radius: 6px; display: block; }

    /* ─── Typing ─────────────────────────────────────────── */
    #typing-indicator {
      padding: .2rem 1rem; font-size: .75rem;
      color: var(--muted); min-height: 20px;
      font-style: italic; flex-shrink: 0;
    }

    /* ─── Input Area ─────────────────────────────────────── */
    .input-area {
      padding: .6rem .85rem;
      padding-bottom: max(.75rem, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--sidebar); flex-shrink: 0;
    }
    .pm-banner {
      display: none;
      background: rgba(155,89,182,.15); border: 1px solid #9b59b6;
      border-radius: 8px; padding: .35rem .75rem;
      font-size: .78rem; margin-bottom: .45rem; color: #c39bd3;
      align-items: center; justify-content: space-between;
    }
    .pm-banner.active { display: flex; }
    .pm-banner button { background: none; border: none; color: #c39bd3; cursor: pointer; font-size: .9rem; }

    .input-row { display: flex; gap: .5rem; align-items: flex-end; }
    #message-input {
      flex: 1; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: .6rem .85rem;
      font-size: 1rem; /* prevents iOS zoom */
      font-family: var(--font); resize: none; outline: none;
      max-height: 110px; overflow-y: auto; line-height: 1.4;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    #message-input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 10px; width: 42px; height: 42px;
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn:active { opacity: .8; }
    .attach-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; width: 42px; height: 42px;
      color: var(--muted); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .attach-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ─── Modal ──────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; padding: 1rem;
    }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.4rem;
      width: 100%; max-width: 320px;
    }
    .modal h3 { margin-bottom: .9rem; font-size: 1rem; }
    .modal input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: .6rem .8rem; margin-bottom: .8rem;
      font-size: 1rem; outline: none;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: .5rem; justify-content: flex-end; }
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); padding: .5rem 1rem;
      border-radius: 8px; cursor: pointer; font-size: .9rem;
    }
    .btn-ghost:hover { border-color: var(--accent); }

    /* ─── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ════════════════════════════════════════════════════
       MOBILE  ≤ 640px
    ════════════════════════════════════════════════════ */
    @media (max-width: 640px) {
      :root { --sidebar-w: 78vw; }

      /* Sidebar slides off-screen by default on mobile */
      .sidebar {
        position: fixed; top: 0; left: 0;
        height: 100%; height: 100dvh;
        transform: translateX(-100%);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
      }
      .sidebar.open { transform: translateX(0); }

      .sidebar-close-btn { display: block; }
      .hamburger-btn     { display: block; }

      /* Messages wider on small screens */
      .msg { max-width: 90%; }
      .bubble img { max-width: 200px; }

      /* Slightly bigger touch targets */
      .room-item { padding: .65rem .7rem; font-size: .9rem; min-height: 44px; }
      .user-dot  { min-height: 44px; }
      .send-btn, .attach-btn { width: 44px; height: 44px; }

      .login-card { padding: 1.6rem; }
    }

    /* TABLET  641–900px */
    @media (min-width: 641px) and (max-width: 900px) {
      :root { --sidebar-w: 200px; }
      .bubble img { max-width: 220px; }
    }
  </style>
</head>
<body>

<!-- ─── Login Overlay ──────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-card">
    <h1>💬 ChatNet</h1>
    <p>Local Network Chat — No Internet Required</p>
    <label>Your Display Name</label>
    <input id="login-name" type="text" placeholder="e.g. Alice" maxlength="30"
           autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" />
    <label>Join a Room</label>
    <select id="login-room">
      <option value="general">🌐 general</option>
      <option value="team-alpha">👥 team-alpha</option>
      <option value="team-beta">👥 team-beta</option>
      <option value="project-vcs">🔧 project-vcs</option>
    </select>
    <button class="btn btn-primary" onclick="joinChat()">Join Chat →</button>
  </div>
</div>

<!-- ─── Main App ───────────────────────────────────────── -->
<div id="app">

  <!-- Mobile dim overlay -->
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>💬 ChatNet</h2>
        <div class="sub">Local Network</div>
      </div>
      <button class="sidebar-close-btn" onclick="closeSidebar()" title="Close">✕</button>
    </div>

    <div class="sidebar-section">Rooms</div>
    <div class="room-list" id="room-list"></div>
    <button class="new-room-btn" onclick="showNewRoomModal()">＋ New Room</button>

    <div class="sidebar-section" style="margin-top:.4rem">Online Now</div>
    <div class="user-list-sidebar" id="user-list"></div>

    <div class="sidebar-footer">
      <div class="me-badge">
        <div class="avatar" id="my-avatar" style="background:#58a6ff">?</div>
        <span id="my-username">Not joined</span>
      </div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="hamburger-btn" onclick="openSidebar()" title="Menu">☰</button>
        <h3 id="room-name-header"># general</h3>
      </div>
      <span id="room-member-count"></span>
    </div>

    <div class="messages" id="messages"></div>
    <div id="typing-indicator"></div>

    <div class="input-area">
      <div class="pm-banner" id="pm-banner">
        <span id="pm-label">Private → </span>
        <button onclick="clearPM()">✕ Cancel</button>
      </div>
      <div class="input-row">
        <label class="attach-btn" title="Send Image">
          📎
          <input type="file" accept="image/*" style="display:none" onchange="sendImage(this)" />
        </label>
        <textarea id="message-input" rows="1"
                  placeholder="Type a message…"
                  onkeydown="handleKey(event)"
                  oninput="handleTyping()"
                  autocomplete="off" autocorrect="off" spellcheck="true"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>
</div>

<!-- New Room Modal -->
<div class="modal-backdrop" id="new-room-modal" style="display:none">
  <div class="modal">
    <h3>Create New Room</h3>
    <input id="new-room-input" type="text"
           placeholder="room-name (no spaces)"
           autocomplete="off" autocorrect="off" autocapitalize="none" />
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="createRoom()">Create</button>
    </div>
  </div>
</div>

<script>
  const socket = io();

  let myUsername     = '';
  let myColor        = '#58a6ff';
  let currentRoom    = 'general';
  let pmTarget       = null;
  let typingTimeout  = null;
  let roomUserCounts = {};
  const defaultRooms = ['general', 'team-alpha', 'team-beta', 'project-vcs'];

  // ── Sidebar (mobile) ──────────────────────────────────
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('active');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('active');
  }

  // ── Join ──────────────────────────────────────────────
  function joinChat() {
    const name = document.getElementById('login-name').value.trim();
    const room = document.getElementById('login-room').value;
    if (!name) { alert('Please enter your name.'); return; }

    myUsername  = name;
    currentRoom = room;
    socket.emit('join', { username: name, room });
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('my-username').textContent = name;
    document.getElementById('my-avatar').textContent   = name[0].toUpperCase();
    renderRoomList();
  }

  document.getElementById('login-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

  // ── Room List ─────────────────────────────────────────
  function renderRoomList() {
    const list  = document.getElementById('room-list');
    const rooms = [...new Set([...defaultRooms, ...Object.keys(roomUserCounts)])];
    list.innerHTML = rooms.map(r => `
      <div class="room-item ${r === currentRoom ? 'active' : ''}" onclick="switchRoom('${r}')">
        <span># ${r}</span>
        ${roomUserCounts[r] ? `<span class="badge">${roomUserCounts[r]}</span>` : ''}
      </div>
    `).join('');
  }

  function switchRoom(room) {
    if (room === currentRoom) return;
    socket.emit('switch_room', { room });
    currentRoom = room;
    pmTarget    = null;
    document.getElementById('pm-banner').classList.remove('active');
    document.getElementById('messages').innerHTML = '';
    document.getElementById('room-name-header').textContent = '# ' + room;
    renderRoomList();
    closeSidebar(); // auto-close on mobile after picking a room
  }

  function showNewRoomModal() {
    document.getElementById('new-room-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('new-room-input').focus(), 50);
  }
  function closeModal() {
    document.getElementById('new-room-modal').style.display = 'none';
  }
  function createRoom() {
    const input = document.getElementById('new-room-input');
    const room  = input.value.trim().toLowerCase().replace(/\s+/g, '-');
    if (!room) return;
    input.value = '';
    closeModal();
    switchRoom(room);
  }
  document.getElementById('new-room-input').addEventListener('keydown', e => {
    if (e.key === 'Enter')  createRoom();
    if (e.key === 'Escape') closeModal();
  });

  // ── Send Message ──────────────────────────────────────
  function sendMessage() {
    const input   = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content) return;

    if (pmTarget) {
      socket.emit('private_message', { toSocketId: pmTarget.socketId, content });
    } else {
      socket.emit('send_message', { content });
    }

    input.value = '';
    input.style.height = 'auto';
    stopTyping();
  }

  function handleKey(e) {
    // Desktop: Enter sends | Shift+Enter = newline
    // Mobile: let soft keyboard handle Enter naturally
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 640) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendImage(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => socket.emit('send_message', { content: reader.result, type: 'image' });
    reader.readAsDataURL(file);
    input.value = '';
  }

  // ── Typing ────────────────────────────────────────────
  function handleTyping() {
    const ta = document.getElementById('message-input');
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
    socket.emit('typing_start');
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(stopTyping, 1500);
  }
  function stopTyping() {
    socket.emit('typing_stop');
    clearTimeout(typingTimeout);
  }

  // ── Private Message ───────────────────────────────────
  function setPM(socketId, username) {
    if (username === myUsername) return;
    pmTarget = { socketId, username };
    document.getElementById('pm-label').textContent = `Private → ${username}`;
    document.getElementById('pm-banner').classList.add('active');
    document.getElementById('message-input').focus();
    closeSidebar();
  }
  function clearPM() {
    pmTarget = null;
    document.getElementById('pm-banner').classList.remove('active');
  }

  // ── Render Message ────────────────────────────────────
  function renderMessage(msg) {
    const container = document.getElementById('messages');
    const div       = document.createElement('div');

    if (msg.type === 'system') {
      div.className = 'msg system';
      div.innerHTML = `<div class="bubble">${escHtml(msg.content)}</div>`;
    } else {
      const isSelf    = msg.username === myUsername;
      const isPrivate = msg.type === 'private';
      div.className   = `msg${isSelf ? ' self' : ''}${isPrivate ? ' private' : ''}`;

      const timeStr      = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const avatar       = `<div class="avatar" style="background:${msg.color}">${msg.username[0].toUpperCase()}</div>`;
      const privateBadge = isPrivate ? `<span class="private-tag">🔒 Private</span>` : '';
      const content      = msg.type === 'image'
        ? `<img src="${msg.content}" alt="shared image" loading="lazy" />`
        : escHtml(msg.content).replace(/\n/g, '<br>');

      div.innerHTML = `
        ${isSelf ? '' : avatar}
        <div class="msg-body">
          <div class="msg-meta">
            ${!isSelf ? `<span class="name" style="color:${msg.color}">${escHtml(msg.username)}</span>` : ''}
            ${privateBadge}
            <span>${timeStr}</span>
          </div>
          <div class="bubble">${content}</div>
        </div>
        ${isSelf ? avatar : ''}
      `;
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── User List ─────────────────────────────────────────
  function renderUserList(users) {
    const list = document.getElementById('user-list');
    list.innerHTML = users.map(u => `
      <div class="user-dot"
           onclick="setPM('${u.id}','${u.username}')"
           title="${u.username === myUsername ? 'You' : 'Tap to DM'}">
        <div class="online-dot"></div>
        <div class="avatar" style="background:${u.color||'#58a6ff'}">${u.username[0].toUpperCase()}</div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${escHtml(u.username)}${u.username===myUsername?'<em style="color:var(--muted);font-size:.72rem"> (you)</em>':''}
        </span>
      </div>
    `).join('');
    document.getElementById('room-member-count').textContent = `${users.length} online`;
  }

  // ── Socket Events ─────────────────────────────────────
  socket.on('message',       msg   => renderMessage(msg));
  socket.on('history',       msgs  => {
    document.getElementById('messages').innerHTML = '';
    msgs.forEach(renderMessage);
  });
  socket.on('user_list',     users => renderUserList(users));
  socket.on('typing_update', typers => {
    const el     = document.getElementById('typing-indicator');
    const others = typers.filter(n => n !== myUsername);
    if      (others.length === 0) el.textContent = '';
    else if (others.length === 1) el.textContent = `${others[0]} is typing…`;
    else                          el.textContent = `${others.slice(0,-1).join(', ')} and ${others.slice(-1)} are typing…`;
  });
  socket.on('room_stats', ({ room, userCount }) => {
    roomUserCounts[room] = userCount;
    renderRoomList();
  });
  socket.on('room_created', ({ name }) => {
    if (!defaultRooms.includes(name)) { defaultRooms.push(name); renderRoomList(); }
  });

  // ── iOS keyboard: scroll messages to bottom ───────────
  if ('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', () => {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    });
  }
</script>
</body>
</html>
